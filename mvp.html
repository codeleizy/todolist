<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>一掐四 · 任务中枢</title>
  <style>
    :root{--ink:#202535;--muted:#778196;--line:#e8ebf1;--blue:#4169e1;--bg:#f7f8fb;--card:#fff;--urgent:#fff0ef;--important:#f3f1ff;--softblue:#edf5ff;--softgray:#f5f6f8;--shadow:0 10px 32px rgba(30,41,59,.07)}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--bg);font:14px/1.45 Inter,ui-sans-serif,system-ui,-apple-system,"Microsoft YaHei",sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer;border:0;background:none;color:inherit}.shell{min-height:100vh;display:grid;grid-template-columns:252px minmax(420px,1fr) 350px}.sidebar{padding:22px 14px;background:#fff;border-right:1px solid var(--line);position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:10px;font-weight:750;font-size:17px;padding:0 10px 22px}.brand i{display:grid;place-items:center;width:28px;height:28px;color:#fff;border-radius:9px;background:linear-gradient(145deg,#6284ff,#4257d6);font-style:normal}.primary{width:100%;padding:11px 13px;border-radius:10px;background:var(--blue);color:#fff;font-weight:650;text-align:left;box-shadow:0 4px 12px #4169e13d}.nav{margin-top:17px}.nav button{width:100%;display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;text-align:left;color:#596276}.nav button:hover,.nav button.active{background:#f0f3ff;color:#334fca;font-weight:650}.nav small{margin-left:auto;color:#8c95a7}.side-title{display:flex;justify-content:space-between;margin:25px 10px 7px;color:#929bae;font-size:12px;font-weight:700}.tree button{font-size:13px}.project-dot{width:8px;height:8px;background:var(--p,#6f84ea);border-radius:99px;display:inline-block}.app{padding:26px min(4vw,54px);max-width:1190px;width:100%;margin:auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px}.topbar h1{font-size:25px;margin:0;letter-spacing:-.6px}.sub{color:var(--muted);font-size:13px;margin-top:2px}.search{width:220px;border:1px solid var(--line);padding:9px 12px;border-radius:9px;background:#fff;outline:0}.toolbar{display:flex;gap:8px;align-items:center}.chip{border:1px solid var(--line);background:#fff;padding:8px 11px;border-radius:8px;color:#586176}.content{min-width:0}.quick-add{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);padding:9px 12px;border-radius:11px;box-shadow:0 2px 5px #34405508;margin-bottom:21px}.quick-add b{font-size:20px;color:var(--blue)}.quick-add input{border:0;outline:0;flex:1;min-width:0}.quick-add button{color:var(--blue);font-weight:650;padding:4px}.section{margin-bottom:25px}.section-head{display:flex;align-items:center;justify-content:space-between;margin:0 0 8px 2px}.section-head h2{font-size:15px;margin:0}.section-head span{color:var(--muted);font-size:12px}.task-list{display:grid;gap:7px}.task{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 12px;display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:9px;transition:.16s;box-shadow:0 2px 5px #34405505}.task:hover{border-color:#cfd6ea;box-shadow:var(--shadow);transform:translateY(-1px)}.task.done{opacity:.6}.check{width:19px;height:19px;border:1.8px solid #a6afbe;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:12px}.task.done .check{background:#5d7cf3;border-color:#5d7cf3}.task-title{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.task.done .task-title{text-decoration:line-through}.meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:4px;color:#798397;font-size:12px}.tag{background:#f1f3f8;border-radius:5px;padding:2px 6px}.due{white-space:nowrap;font-size:12px;color:#657086}.due.overdue{color:#d15252;font-weight:650}.empty{border:1px dashed #dbe0e9;border-radius:11px;color:#919bad;text-align:center;padding:27px;background:#ffffff8c}.quad{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);overflow:hidden;border-radius:16px;background:#fff;box-shadow:0 3px 10px #34405508}.quadrant{min-height:240px;padding:17px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.quadrant:nth-child(2n){border-right:0}.quadrant:nth-child(n+3){border-bottom:0}.quadrant.q1{background:linear-gradient(135deg,#fff5f3,#fff)}.quadrant.q2{background:linear-gradient(135deg,#f6f3ff,#fff)}.quadrant.q3{background:linear-gradient(135deg,#fffbed,#fff)}.quadrant.q4{background:linear-gradient(135deg,#f5f7fa,#fff)}.quad-title{font-weight:750;font-size:14px;display:flex;align-items:center;gap:7px;margin-bottom:14px}.quad-title:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--dot)}.q1{--dot:#e46860}.q2{--dot:#8772d9}.q3{--dot:#dbac30}.q4{--dot:#a0a7b2}.dots{display:flex;align-content:flex-start;flex-wrap:wrap;gap:12px;padding:7px}.task-dot{position:relative;width:17px;height:17px;border-radius:99px;background:var(--dot);border:3px solid #fff;box-shadow:0 0 0 1px #d8dce5;cursor:pointer}.task-dot.has-children:after{content:"";position:absolute;inset:-5px;border:1px dashed var(--dot);border-radius:50%}.task-dot:hover{transform:scale(1.35)}.task-dot:hover:before{content:attr(data-tip);position:absolute;z-index:5;left:12px;top:-9px;width:max-content;max-width:220px;padding:7px 9px;border-radius:7px;background:#252a38;color:#fff;font-size:12px;box-shadow:var(--shadow)}.quad-empty{color:#a3abb9;font-size:12px}.calendar{background:#fff;border:1px solid var(--line);border-radius:15px;overflow:hidden}.cal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}.weekday{padding:9px;text-align:center;color:#8993a5;font-size:12px;border-bottom:1px solid var(--line)}.day{min-height:105px;padding:8px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.day:nth-child(7n){border-right:0}.date-num{font-size:12px;color:#6e7788}.today .date-num{display:grid;place-items:center;width:22px;height:22px;color:#fff;background:var(--blue);border-radius:50%}.cal-task{margin-top:5px;padding:3px 5px;border-radius:4px;background:#eef2ff;color:#465cb8;font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}.cal-task.urgent{background:#fff0ee;color:#c14f47}.details{background:#fff;border-left:1px solid var(--line);padding:24px 21px;position:sticky;top:0;height:100vh;overflow:auto}.detail-empty{height:100%;display:grid;place-content:center;text-align:center;color:#98a1b0}.detail-empty strong{color:#616a7b;margin-bottom:5px}.detail-title{width:100%;font-size:20px;font-weight:750;border:0;outline:0;padding:3px 0}.form-label{display:block;color:#7d8799;font-size:12px;font-weight:700;margin:20px 0 6px}.field{border:1px solid var(--line);width:100%;border-radius:8px;padding:9px;background:#fff;outline-color:#8aa0f7}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.detail-actions{display:flex;gap:8px;margin-top:21px}.secondary{border:1px solid var(--line);padding:9px 11px;border-radius:8px;color:#657084}.danger{color:#c75151;margin-left:auto}.children{margin-top:7px}.child{display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid #f0f1f4}.child input{border:0;outline:0;flex:1;min-width:0}.modal-wrap{position:fixed;inset:0;background:#19223562;display:none;place-items:center;z-index:20;padding:18px}.modal-wrap.open{display:grid}.modal{max-width:420px;width:100%;background:#fff;border-radius:16px;padding:22px;box-shadow:0 20px 70px #10182855}.modal h2{margin:0 0 6px;font-size:19px}.modal p{margin:0 0 15px;color:#748094}.modal form{display:grid;gap:10px}.notice{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#252a38;color:#fff;padding:9px 13px;border-radius:9px;font-size:13px;display:none;z-index:30}.notice.show{display:block}.mobile-nav{display:none}
    @media(max-width:1040px){.shell{grid-template-columns:220px minmax(360px,1fr)}.details{display:none}.app{padding:24px}.sidebar{padding-left:10px;padding-right:10px}}
    @media(max-width:720px){body{padding-bottom:70px}.shell{display:block}.sidebar{display:none}.app{padding:18px 14px}.topbar{margin-bottom:17px}.topbar h1{font-size:22px}.search{width:36px;color:transparent;padding:9px;background:#fff}.toolbar .chip{display:none}.quick-add{margin-bottom:17px}.quad{grid-template-columns:1fr}.quadrant{min-height:164px;border-right:0!important;border-bottom:1px solid var(--line)!important}.quadrant:last-child{border-bottom:0!important}.day{min-height:72px;padding:5px}.cal-task{font-size:10px}.mobile-nav{position:fixed;display:grid;grid-template-columns:repeat(5,1fr);bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:10}.mobile-nav button{padding:10px 3px;font-size:11px;color:#788194}.mobile-nav button.active{color:var(--blue);font-weight:700}.task{grid-template-columns:22px 1fr auto;padding:10px}.task .meta{display:none}.due{font-size:11px}.calendar{border-radius:11px}.weekday{padding:6px 2px}.section{margin-bottom:20px}}
  </style>
</head>
<body>
  <main class="shell" id="app" hidden>
    <aside class="sidebar"><div class="brand"><i>✓</i> 一掐四</div><button class="primary" id="newTask">＋ 新建任务</button><nav class="nav" id="nav"><button data-view="inbox">▣ 收件箱 <small id="inboxCount"></small></button><button data-view="today" class="active">◷ 今日</button><button data-view="quadrant">⊞ 四象限</button><button data-view="calendar">▦ 日历</button><button data-view="archive">⌑ 归档</button></nav><div class="side-title">项目 <button id="newProject">＋</button></div><div class="tree" id="projectTree"></div><button id="newCategory" style="color:var(--blue);padding:9px 10px;font-size:12px">＋ 新建分类</button></aside>
    <section class="app"><header class="topbar"><div><h1 id="viewTitle">今日</h1><div class="sub" id="viewSubtitle">今天可以推进和需要关注的任务</div></div><div class="toolbar"><input class="search" id="search" placeholder="搜索任务"><button class="chip" id="refresh">↻ 刷新</button></div></header><div id="view"></div></section>
    <aside class="details" id="details"><div class="detail-empty"><strong>选择一个任务</strong><span>查看详情或快速整理</span></div></aside>
  </main>
  <section id="login" class="modal-wrap open"><div class="modal"><h2>欢迎回来</h2><p>使用邮箱魔法链接登录后，任务会安全保存在你的 Supabase 数据库中。</p><form id="loginForm"><input class="field" id="email" type="email" required placeholder="name@example.com"><button class="primary" type="submit" style="text-align:center">发送登录链接</button></form><p id="loginMessage" style="margin-top:12px;font-size:12px"></p></div></section>
  <div class="modal-wrap" id="taskModal"><div class="modal"><h2>新建任务</h2><p>默认存入收件箱，之后可以在详情中补充信息。</p><form id="createForm"><input class="field" id="createTitle" required maxlength="300" placeholder="记录一件要做的事……"><div class="detail-actions"><button type="button" class="secondary" data-close>取消</button><button class="primary" style="text-align:center">保存</button></div></form></div></div>
  <div class="modal-wrap" id="projectModal"><div class="modal"><h2>新建项目</h2><p>项目是最大的归属层级；分类可在项目下继续添加。</p><form id="projectForm"><input class="field" id="projectName" required maxlength="80" placeholder="例如：工作、生活、产品开发"><div class="detail-actions"><button type="button" class="secondary" data-close>取消</button><button class="primary" style="text-align:center">创建项目</button></div></form></div></div>
  <div class="modal-wrap" id="categoryModal"><div class="modal"><h2>新建分类</h2><p>一个分类属于一个项目；任务可以选择项目和分类，也可以不选择。</p><form id="categoryForm"><select class="field" id="categoryProject" required></select><input class="field" id="categoryName" required maxlength="80" placeholder="例如：开发、沟通、行政"><div class="detail-actions"><button type="button" class="secondary" data-close>取消</button><button class="primary" style="text-align:center">创建分类</button></div></form></div></div>
  <nav class="mobile-nav" id="mobileNav"><button data-view="inbox">收件箱</button><button class="active" data-view="today">今日</button><button data-view="quadrant">四象限</button><button data-view="calendar">日历</button><button data-view="archive">归档</button></nav><div class="notice" id="notice"></div>
  <script src="config.js"></script>
  <script>
  const cfg=window.TODO_CONFIG||{},root=String(cfg.supabaseUrl||'').replace(/\/rest\/v1\/?$/,'').replace(/\/$/,''),$=s=>document.querySelector(s),state={tasks:[],projects:[],categories:[],view:'today',selected:null,month:new Date()},tz='Asia/Shanghai';
  const esc=s=>String(s??'').replace(/[&<>'"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[x]));
  const tokenOK=t=>typeof t==='string'&&t.split('.').length===3;
  const uid=()=>JSON.parse(atob(localStorage.todo_token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))).sub;
  function note(t){let n=$('#notice');n.textContent=t;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2600)}
  async function session(){let h=new URLSearchParams(location.hash.slice(1)),t=h.get('access_token');if(t){localStorage.todo_token=t;history.replaceState(null,'',location.pathname)}if(!tokenOK(localStorage.todo_token)){localStorage.removeItem('todo_token');return null}return localStorage.todo_token}
  async function api(path,opt={}){let r=await fetch(root+'/rest/v1/'+path,{...opt,headers:{apikey:cfg.supabaseAnonKey,authorization:'Bearer '+localStorage.todo_token,'content-type':'application/json',...opt.headers}});let text=await r.text(),data=text?JSON.parse(text):null;if(!r.ok)throw Error(data?.message||data?.hint||'请求失败');return data}
  const q=s=>encodeURIComponent(s);
  function nowDate(){return new Intl.DateTimeFormat('en-CA',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date())}
  function taskDate(t){return t.scheduled_for||(t.due_at?t.due_at.slice(0,10):'')}
  function dateText(t){if(!t.due_at)return '';let d=t.due_at.slice(0,10),today=nowDate();if(d<today)return '已逾期';if(d===today)return '今天截止';return new Intl.DateTimeFormat('zh-CN',{month:'numeric',day:'numeric',timeZone:tz}).format(new Date(t.due_at))}
  function activeTasks(){return state.tasks.filter(t=>!t.parent_id&&!t.archived_at)}
  function children(id){return state.tasks.filter(t=>t.parent_id===id)}
  async function load(){try{let u=uid(),[tasks,projects,categories]=await Promise.all([api(`tasks?user_id=eq.${u}&select=*&order=manual_order.desc,created_at.desc`),api(`projects?user_id=eq.${u}&select=*&order=created_at.asc`),api(`categories?user_id=eq.${u}&select=*&order=created_at.asc`)]);state.tasks=tasks;state.projects=projects;state.categories=categories;render()}catch(e){note(e.message)}}
  function nav(){document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));$('#viewTitle').textContent=({inbox:'收件箱',today:'今日',quadrant:'四象限',calendar:'日历',archive:'归档'})[state.view];$('#viewSubtitle').textContent=({inbox:'先记下来，之后再整理',today:'今天可以推进和需要关注的任务',quadrant:'一掐四：用位置判断优先级',calendar:'按计划日期与截止日期查看',archive:'已经完成、取消或归档的任务'})[state.view];$('#inboxCount').textContent=activeTasks().filter(t=>t.status==='收件箱').length}
  function projects(){let h=state.projects.map(p=>`<button data-project="${p.id}"><i class="project-dot" style="--p:${esc(p.color)}"></i> ${esc(p.name)}</button>${state.categories.filter(c=>c.project_id===p.id).map(c=>`<button data-category="${c.id}" style="padding-left:28px">⌞ ${esc(c.name)}</button>`).join('')}`).join('');$('#projectTree').innerHTML=h||'<div style="padding:8px 10px;color:#9aa3b4;font-size:12px">还没有项目</div>'}
  function taskRow(t){let p=state.projects.find(x=>x.id===t.project_id),done=t.status==='已完成',kids=children(t.id),open=kids.filter(x=>x.status!=='已完成').length;return `<article class="task ${done?'done':''}" data-task="${t.id}"><button class="check" data-complete="${t.id}">${done?'✓':''}</button><div><div class="task-title">${esc(t.title)}</div><div class="meta">${p?`<span class="tag">${esc(p.name)}</span>`:''}${t.status!=='收件箱'?`<span>${esc(t.status)}</span>`:''}${kids.length?`<span>子任务 ${kids.filter(x=>x.status==='已完成').length}/${kids.length}</span>`:''}${done&&open&&!t.hide_incomplete_children_notice?`<span style="color:#c17a34">仍有 ${open} 项未完成</span>`:''}</div></div><span class="due ${t.due_at&&t.due_at.slice(0,10)<nowDate()?'overdue':''}">${dateText(t)}</span></article>`}
  function listSection(title,list,hint=''){return `<section class="section"><div class="section-head"><h2>${title}</h2><span>${list.length?list.length+' 项':hint}</span></div><div class="task-list">${list.map(taskRow).join('')||`<div class="empty">暂无任务</div>`}</div></section>`}
  function renderInbox(){let list=activeTasks().filter(t=>t.status==='收件箱');return `<div class="quick-add"><b>＋</b><input id="inlineAdd" placeholder="记录一件要做的事……"><button id="inlineSave">添加</button></div>${listSection('待整理',list,'快速记录，不必现在分类')}`}
  function renderToday(){let today=nowDate(),all=activeTasks().filter(t=>!['已完成','已取消','阻塞'].includes(t.status)),late=all.filter(t=>t.due_at&&t.due_at.slice(0,10)<=today),progress=all.filter(t=>t.status==='进行中'&&!late.includes(t)),planned=all.filter(t=>t.scheduled_for===today&&!late.includes(t)&&!progress.includes(t)),future=all.filter(t=>t.due_at&&t.due_at.slice(0,10)>today&&!late.includes(t)&&!progress.includes(t)&&!planned.includes(t));return `${listSection('已逾期 / 今天截止',late)}${listSection('进行中',progress)}${listSection('计划今天',planned)}${listSection('未来有截止时间',future,'所有未来截止任务都会列出')}`}
  function renderQuad(){let a=activeTasks().filter(t=>!['已完成','已取消','阻塞'].includes(t.status)),group=(im,ur)=>a.filter(t=>t.importance===im&&t.urgency===ur);function cell(cl,title,items){return `<section class="quadrant ${cl}"><div class="quad-title">${title}<span style="color:#8b94a4;font-weight:500">${items.length}</span></div><div class="dots">${items.map(t=>`<button class="task-dot ${children(t.id).length?'has-children':''}" data-task="${t.id}" data-tip="${esc(t.title)}${t.due_at?' · '+dateText(t):''}"></button>`).join('')||'<span class="quad-empty">暂无任务</span>'}</div></section>`}return `<div class="quad">${cell('q1','重要且紧急',group(true,true))}${cell('q2','重要但不紧急',group(true,false))}${cell('q3','不重要但紧急',group(false,true))}${cell('q4','不重要且不紧急',group(false,false))}</div><p class="sub" style="margin:12px 2px">圆点代表任务；外圈虚线代表含有子任务。悬停圆点可查看任务名称和截止状态。</p>`}
  function renderCalendar(){let d=state.month,y=d.getFullYear(),m=d.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),cells=[];for(let i=0;i<first;i++)cells.push('<div class="day"></div>');for(let n=1;n<=days;n++){let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(n).padStart(2,'0')}`,items=activeTasks().filter(t=>taskDate(t)===ds);cells.push(`<div class="day ${ds===nowDate()?'today':''}"><span class="date-num">${n}</span>${items.map(t=>`<div class="cal-task ${t.urgency?'urgent':''}" data-task="${t.id}">${esc(t.title)}</div>`).join('')}</div>`)}return `<div class="calendar"><div class="cal-head"><button id="prevMonth">‹</button><span>${y} 年 ${m+1} 月</span><button id="nextMonth">›</button></div><div class="cal-grid">${['日','一','二','三','四','五','六'].map(x=>`<div class="weekday">${x}</div>`).join('')}${cells.join('')}</div></div><p class="sub" style="margin:12px 2px">计划日期优先显示；未设置计划日期时，按截止日期显示。</p>`}
  function renderArchive(){let a=state.tasks.filter(t=>!t.parent_id&&(t.archived_at||['已完成','已取消'].includes(t.status)));return listSection('归档记录',a,'完成或取消的任务会保留在这里')}
  function render(){nav();projects();let v={inbox:renderInbox,today:renderToday,quadrant:renderQuad,calendar:renderCalendar,archive:renderArchive}[state.view];$('#view').innerHTML=v();if(state.selected){let fresh=state.tasks.find(t=>t.id===state.selected.id);fresh?showDetails(fresh):closeDetails()}}
  function field(label,content){return `<label class="form-label">${label}</label>${content}`}
  function showDetails(t){state.selected=t;let pOpts=`<option value="">未设置</option>${state.projects.map(p=>`<option value="${p.id}" ${t.project_id===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}`,cOpts=`<option value="">未设置</option>${state.categories.filter(c=>!t.project_id||c.project_id===t.project_id).map(c=>`<option value="${c.id}" ${t.category_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}`,kids=children(t.id),open=kids.filter(x=>x.status!=='已完成').length;$('#details').innerHTML=`<button id="closeDetails" style="float:right;color:#8790a0">×</button><input class="detail-title" id="dtitle" value="${esc(t.title)}">${field('状态',`<select class="field" id="dstatus">${['收件箱','待进行','进行中','已完成','已取消','阻塞'].map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join('')}</select>`)}<div class="row">${field('重要度',`<select class="field" id="dimportance"><option value="true" ${t.importance?'selected':''}>重要</option><option value="false" ${!t.importance?'selected':''}>不重要</option></select>`)}${field('紧急度',`<select class="field" id="durgency"><option value="true" ${t.urgency?'selected':''}>紧急</option><option value="false" ${!t.urgency?'selected':''}>不紧急</option></select>`)}</div>${field('描述',`<textarea class="field" id="ddesc" rows="3" placeholder="补充说明…">${esc(t.description)}</textarea>`)}<div class="row">${field('计划日期',`<input class="field" id="dscheduled" type="date" value="${t.scheduled_for||''}">`)}${field('截止时间',`<input class="field" id="ddue" type="datetime-local" value="${t.due_at?t.due_at.slice(0,16):''}">`)}</div>${field('归属',`<select class="field" id="dproject">${pOpts}</select><select class="field" id="dcategory" style="margin-top:7px">${cOpts}</select>`)}<label class="form-label">子任务 ${kids.filter(x=>x.status==='已完成').length}/${kids.length}</label>${t.status==='已完成'&&open?`<button id="toggleChildNotice" class="secondary" style="font-size:12px">${t.hide_incomplete_children_notice?'恢复未完成提醒':'不再提示 '+open+' 项未完成子任务'}</button>`:''}<div class="children">${kids.map(k=>`<div class="child"><button class="check ${k.status==='已完成'?'checked':''}" data-child-complete="${k.id}">${k.status==='已完成'?'✓':''}</button><input value="${esc(k.title)}" data-child-title="${k.id}"></div>`).join('')}<button id="addChild" style="color:var(--blue);padding:9px 0;font-weight:650">＋ 添加子任务</button></div><div class="detail-actions"><button class="primary" id="saveDetails" style="text-align:center">保存更改</button><button class="secondary" id="archiveTask">归档</button><button class="danger" id="deleteTask">删除</button></div>`}
  function closeDetails(){state.selected=null;$('#details').innerHTML='<div class="detail-empty"><strong>选择一个任务</strong><span>查看详情或快速整理</span></div>'}
  async function create(title,parent_id=null){let row={title,status:'收件箱',user_id:uid(),parent_id,manual_order:Date.now()};let d=await api('tasks',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify(row)});state.tasks.unshift(d[0]);render();if(parent_id)showDetails(state.tasks.find(x=>x.id===parent_id));note('已保存')}
  async function patchTask(id,body){let d=await api(`tasks?id=eq.${id}`,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify(body)});let i=state.tasks.findIndex(t=>t.id===id);if(d[0]&&i>=0)state.tasks[i]=d[0];return d[0]}
  document.addEventListener('click',async e=>{let view=e.target.closest('[data-view]');if(view){state.view=view.dataset.view;render();return}let task=e.target.closest('[data-task]');if(task&&!e.target.closest('[data-complete]')){showDetails(state.tasks.find(t=>t.id===task.dataset.task));return}let complete=e.target.closest('[data-complete]');if(complete){let t=state.tasks.find(x=>x.id===complete.dataset.complete);await patchTask(t.id,{status:t.status==='已完成'?'待进行':'已完成'});await load();return}let child=e.target.closest('[data-child-complete]');if(child){let t=state.tasks.find(x=>x.id===child.dataset.childComplete);await patchTask(t.id,{status:t.status==='已完成'?'待进行':'已完成'});await load();return}if(e.target.id==='newTask'){$('#taskModal').classList.add('open');$('#createTitle').focus()}if(e.target.id==='newProject'){$('#projectModal').classList.add('open');$('#projectName').focus()}if(e.target.id==='newCategory'){if(!state.projects.length){note('请先创建项目');return}$('#categoryProject').innerHTML=state.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');$('#categoryModal').classList.add('open');$('#categoryName').focus()}if(e.target.matches('[data-close]'))e.target.closest('.modal-wrap').classList.remove('open');if(e.target.id==='closeDetails')closeDetails();if(e.target.id==='refresh')load();if(e.target.id==='inlineSave'){let x=$('#inlineAdd');if(x.value.trim()){await create(x.value.trim());x.value=''}}if(e.target.id==='prevMonth'){state.month=new Date(state.month.getFullYear(),state.month.getMonth()-1);render()}if(e.target.id==='nextMonth'){state.month=new Date(state.month.getFullYear(),state.month.getMonth()+1);render()}if(e.target.id==='addChild'){let title=prompt('子任务名称');if(title?.trim())await create(title.trim(),state.selected.id)}if(e.target.id==='toggleChildNotice'){await patchTask(state.selected.id,{hide_incomplete_children_notice:!state.selected.hide_incomplete_children_notice});await load();return}if(e.target.id==='saveDetails'){let t=state.selected,body={title:$('#dtitle').value.trim()||t.title,status:$('#dstatus').value,importance:$('#dimportance').value==='true',urgency:$('#durgency').value==='true',description:$('#ddesc').value,scheduled_for:$('#dscheduled').value||null,due_at:$('#ddue').value?new Date($('#ddue').value).toISOString():null,project_id:$('#dproject').value||null,category_id:$('#dcategory').value||null};await patchTask(t.id,body);for(let inp of document.querySelectorAll('[data-child-title]')){let old=state.tasks.find(x=>x.id===inp.dataset.childTitle);if(old&&inp.value.trim()&&old.title!==inp.value.trim())await patchTask(old.id,{title:inp.value.trim()})}note('已更新');await load()}if(e.target.id==='archiveTask'){await patchTask(state.selected.id,{archived_at:new Date().toISOString()});closeDetails();render();note('已归档')}if(e.target.id==='deleteTask'&&confirm('确定删除这项任务吗？')){await api(`tasks?id=eq.${state.selected.id}`,{method:'DELETE'});state.tasks=state.tasks.filter(t=>t.id!==state.selected.id&&t.parent_id!==state.selected.id);closeDetails();render();note('已删除')}});
  $('#createForm').onsubmit=async e=>{e.preventDefault();await create($('#createTitle').value.trim());$('#createTitle').value='';$('#taskModal').classList.remove('open')};$('#projectForm').onsubmit=async e=>{e.preventDefault();let d=await api('projects',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({name:$('#projectName').value.trim(),user_id:uid()})});state.projects.push(d[0]);$('#projectModal').classList.remove('open');render();note('项目已创建')};$('#categoryForm').onsubmit=async e=>{e.preventDefault();let d=await api('categories',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({name:$('#categoryName').value.trim(),project_id:$('#categoryProject').value,user_id:uid()})});state.categories.push(d[0]);$('#categoryModal').classList.remove('open');render();note('分类已创建')};$('#loginForm').onsubmit=async e=>{e.preventDefault();try{let r=await fetch(root+'/auth/v1/otp',{method:'POST',headers:{apikey:cfg.supabaseAnonKey,'content-type':'application/json'},body:JSON.stringify({email:$('#email').value,options:{emailRedirectTo:location.origin+location.pathname}})});if(!r.ok)throw Error('发送失败，请检查 Supabase 配置');$('#loginMessage').textContent='登录链接已发出，请在邮箱中打开。'}catch(err){$('#loginMessage').textContent=err.message}};$('#search').oninput=e=>{let s=e.target.value.trim().toLowerCase();document.querySelectorAll('.task').forEach(x=>x.hidden=s&&!x.innerText.toLowerCase().includes(s))};
  (async()=>{if(!cfg.supabaseUrl||!cfg.supabaseAnonKey){$('#loginMessage').textContent='尚未配置 Vercel 的 SUPABASE_URL / SUPABASE_ANON_KEY。';return}if(await session()){$('#login').classList.remove('open');$('#app').hidden=false;load()}})();
  </script>
</body></html>
