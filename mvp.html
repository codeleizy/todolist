<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>任务中枢 MVP 验证</title><style>body{max-width:680px;margin:50px auto;padding:0 20px;font:15px/1.5 system-ui;color:#1d2939}input,button{padding:10px;border:1px solid #d0d8e2;border-radius:8px;font:inherit}button{color:#fff;background:#3478e8;border:0;cursor:pointer}form{display:flex;gap:8px;margin:14px 0}#email{flex:1}li{padding:10px 0;border-bottom:1px solid #e7edf4}.hint{color:#6f7c8e}</style><body><h1>任务中枢 · MVP 验证</h1><p class="hint">验证链路：邮箱魔法链接登录 → Supabase 数据库。</p><section id="login"><form id="loginForm"><input id="email" type="email" required placeholder="输入你的邮箱"><button>发送登录链接</button></form></section><section id="tasks" hidden><form id="taskForm"><input id="taskTitle" required placeholder="新增一个任务" style="flex:1"><button>保存</button></form><ul id="list"></ul></section><p id="message"></p><script src="config.js"></script><script>const c=window.TODO_CONFIG||{},m=document.querySelector('#message'),show=x=>m.textContent=x,valid=t=>typeof t==='string'&&t.split('.').length===3,userId=()=>JSON.parse(atob(localStorage.token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))).sub;async function auth(){let h=location.hash.slice(1);if(h){let t=new URLSearchParams(h).get('access_token');if(t){localStorage.token=t;history.replaceState(null,'',location.pathname)}}if(!valid(localStorage.token)){localStorage.removeItem('token');return null}return localStorage.token}async function db(path,o={}){let r=await fetch(c.supabaseUrl+'/rest/v1/'+path,{...o,headers:{apikey:c.supabaseAnonKey,authorization:'Bearer '+localStorage.token,'content-type':'application/json',...o.headers}});let d=await r.json();if(!r.ok)throw Error(d.message||'请求失败');return d}async function load(){try{let d=await db('tasks?select=id,title,status&order=created_at.desc');list.innerHTML=d.map(x=>`<li>${x.title} <small class="hint">${x.status}</small></li>`).join('')||'<li class="hint">还没有任务</li>'}catch(e){show(e.message)}}loginForm.onsubmit=async e=>{e.preventDefault();let r=await fetch(c.supabaseUrl+'/auth/v1/otp',{method:'POST',headers:{apikey:c.supabaseAnonKey,'content-type':'application/json'},body:JSON.stringify({email:email.value,options:{emailRedirectTo:location.href}})});show(r.ok?'登录链接已发出，请在邮箱中打开。':'发送失败，请检查配置。')};taskForm.onsubmit=async e=>{e.preventDefault();await db('tasks',{method:'POST',headers:{prefer:'return=representation'},body:JSON.stringify({title:taskTitle.value,status:'收件箱',user_id:userId()})});taskTitle.value='';load()};(async()=>{if(await auth()){login.hidden=true;tasks.hidden=false;load()}})()</script></body></html>
