<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>清单 · 任务中枢</title>
  <style>
    :root { --blue:#3b82f6; --ink:#18212f; --muted:#7d899b; --line:#e8edf3; --page:#f6f8fb; --card:#fff; --radius:14px; }
    * { box-sizing:border-box; } body { margin:0; color:var(--ink); font:14px/1.45 Inter,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--page); }
    button,input,textarea { font:inherit; } button { cursor:pointer; border:0; background:transparent; color:inherit; }
    .app { display:grid; grid-template-columns:248px minmax(500px,1fr) 330px; height:100vh; min-height:680px; }
    .sidebar { padding:26px 16px; border-right:1px solid var(--line); background:#fff; }
    .brand { display:flex; align-items:center; gap:10px; margin:0 10px 28px; font-size:18px; font-weight:750; letter-spacing:-.5px; }
    .brand-mark { display:grid; place-items:center; width:27px; height:27px; background:var(--blue); color:#fff; border-radius:9px; font-weight:800; }
    .new-task { width:100%; padding:10px 12px; border-radius:10px; background:#eaf2ff; color:#2563d8; text-align:left; font-weight:650; margin-bottom:18px; }
    .new-task:hover { background:#deebff; }
    .nav-label { color:#a1abba; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; margin:20px 11px 7px; }
    .nav-item { display:flex; align-items:center; gap:11px; width:100%; padding:9px 11px; border-radius:9px; text-align:left; color:#536074; }
    .nav-item:hover { background:#f4f7fb; } .nav-item.active { color:#2463d3; background:#edf4ff; font-weight:650; }
    .icon { width:18px; text-align:center; font-size:16px; color:inherit; } .count { margin-left:auto; font-size:12px; color:#98a3b3; }
    .project { padding-left:11px; } .tree { padding-left:30px; display:none; } .project.open + .tree { display:block; } .tree button { display:block; width:100%; padding:6px 0; text-align:left; color:#728094; font-size:13px; }
    .main { padding:30px 34px; overflow:auto; } .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:27px; }
    h1 { font-size:25px; margin:0; letter-spacing:-.8px; } .sub { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .actions { display:flex; gap:9px; } .pill { padding:8px 11px; border:1px solid var(--line); border-radius:8px; background:#fff; color:#59677a; } .pill:hover { border-color:#c7d5e7; }
    .quick-add { display:flex; align-items:center; gap:12px; padding:13px 15px; border:1.5px dashed #cad7e8; border-radius:12px; background:#fff; color:#8290a2; margin-bottom:28px; }
    .quick-add:focus-within { border-color:var(--blue); } .quick-add input { border:0; outline:0; flex:1; color:var(--ink); background:transparent; } .quick-add b { color:var(--blue); font-size:18px; }
    .today-board { display:grid; grid-template-columns:repeat(4,minmax(185px,1fr)); gap:14px; align-items:stretch; overflow-x:auto; padding-bottom:8px; }.section { display:flex; flex-direction:column; min-height:460px; margin:0; overflow:hidden; border:1px solid var(--line); border-radius:13px; background:#f8fafc; }.section-head { display:flex; align-items:center; justify-content:space-between; margin:0; padding:13px 13px 11px; color:#405069; font-size:13px; font-weight:750; }.section-head::before { content:'◌'; margin-right:7px; font-size:15px; }.section-head .section-count { margin-left:auto; }.section.overdue { background:#fff8f7; border-color:#f2d5d2; }.section.overdue .section-head { color:#b84d48; }.section.overdue .section-head::before { content:'!'; display:grid; place-items:center; width:15px; height:15px; color:#fff; border-radius:50%; background:#df665e; font-size:11px; }.section:nth-child(2) { background:#fffdf7; border-color:#f0e5c8; }.section:nth-child(2) .section-head { color:#966d19; }.section:nth-child(3) { background:#f7faff; border-color:#dce8f8; }.section:nth-child(3) .section-head { color:#3f78bc; }.section:nth-child(4) { background:#f8fafb; }.section .task-list { display:flex; flex:1; flex-direction:column; gap:9px; padding:0 9px 10px; overflow-y:auto; border:0; border-radius:0; background:transparent; }.today-board .task { display:grid; grid-template-columns:21px 1fr; gap:8px; min-height:95px; padding:12px 10px; border:1px solid #e1e7ef; border-radius:9px; background:#fff; box-shadow:0 1px 2px #20304009; }.today-board .task .task-title { align-self:start; white-space:normal; }.today-board .task .meta { grid-column:2; align-self:end; font-size:11px; }.today-board .task .due { grid-column:2; font-size:11px; }.today-board .task:hover,.today-board .task.selected { border-color:#a9c8ee; background:#fff; }.today-board .task:last-child { border-bottom:1px solid #e1e7ef; }
    .section-count { font-size:11px; font-weight:500; color:#a3adba; } .task-list { background:#fff; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
    .task { display:grid; grid-template-columns:25px minmax(100px,1fr) auto auto; gap:12px; align-items:center; padding:13px 15px; border-bottom:1px solid var(--line); transition:.14s; }
    .task:last-child { border-bottom:0; } .task:hover,.task.selected { background:#f7faff; } .task.done .task-title { color:#98a3b3; text-decoration:line-through; }
    .check { width:18px; height:18px; border:1.8px solid #b2bece; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:11px; } .done .check { background:#65ad85; border-color:#65ad85; }
    .task-title { font-weight:600; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .meta { color:#8a96a7; font-size:12px; white-space:nowrap; }.due { font-size:12px; color:#68778a; white-space:nowrap; }.due.urgent { color:#e05a55; font-weight:650; }
    .detail { padding:27px 24px; background:#fff; border-left:1px solid var(--line); overflow:auto; } .detail-empty { color:#9aa5b4; margin-top:180px; text-align:center; }.detail-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }.detail-head span { color:#8290a2; font-size:13px; }.close { color:#8a96a7; font-size:20px; }
    #detail-title { width:100%; border:0; border-bottom:1px solid transparent; outline:0; padding:2px 0 8px; font-size:20px; font-weight:720; letter-spacing:-.4px; }.detail-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eef1f5; }.detail-row label { color:#8490a0; }.select { padding:5px 8px; border:1px solid #e0e7f0; background:#fafcff; border-radius:6px; color:#405069; }
    .detail-section { padding-top:21px; }.detail-section h3 { margin:0 0 9px; font-size:12px; color:#8490a0; }.desc { min-height:64px; width:100%; resize:none; border:1px solid #e8edf3; border-radius:8px; padding:9px; outline:none; color:#536074; }.subtask { display:flex; gap:9px; align-items:center; padding:7px 0; color:#566579; }.tiny-check { width:15px; height:15px; border:1.5px solid #c4cdd8; border-radius:4px; }.add-sub { margin-top:5px; color:#3978df; font-weight:600; }.danger { width:100%; margin-top:30px; padding:9px; border-radius:8px; color:#c76565; background:#fff5f5; }
    .matrix-wrap { position:relative; padding:28px 0 0 28px; }.matrix-axis-y { position:absolute; left:-5px; top:50%; transform:rotate(-90deg) translateX(-50%); transform-origin:left top; color:#7d899b; font-size:12px; font-weight:700; letter-spacing:.08em; }.matrix-axis-x { position:absolute; bottom:-24px; left:53%; color:#7d899b; font-size:12px; font-weight:700; letter-spacing:.08em; }.quadrants { display:grid; grid-template-columns:1fr 1fr; gap:0; overflow:hidden; border:2px solid #cad7e5; border-radius:14px; box-shadow:0 8px 20px #25476b0d; }.quadrant { position:relative; min-height:300px; padding:17px; overflow:hidden; }.quadrant:nth-child(odd){border-right:2px solid #cad7e5}.quadrant:nth-child(-n+2){border-bottom:2px solid #cad7e5}.quadrant h2 { position:relative; z-index:1; display:flex; align-items:center; gap:8px; margin:0; font-size:13px; }.quadrant h2::before { content:''; width:9px; height:9px; border-radius:50%; }.quadrant.q1 { background:#fff7f6; }.quadrant.q1 h2::before,.q1 .quad-dot { background:#e76662; }.quadrant.q2 { background:#f4f9ff; }.quadrant.q2 h2::before,.q2 .quad-dot { background:#4a90e2; }.quadrant.q3 { background:#fffaf0; }.quadrant.q3 h2::before,.q3 .quad-dot { background:#d69d28; }.quadrant.q4 { background:#f8fafc; }.quadrant.q4 h2::before,.q4 .quad-dot { background:#8896a8; }.dot-field { position:absolute; inset:40px 12px 12px; }.quad-dot { position:absolute; width:14px; height:14px; padding:0; border:2px solid #fff; border-radius:50%; box-shadow:0 1px 4px #23364a35; transition:transform .14s; }.quad-dot:hover,.quad-dot:focus { z-index:4; transform:scale(1.45); outline:0; }.quad-dot.parent { width:19px; height:19px; border:3px double #fff; }.quad-dot.parent::after { content:''; position:absolute; width:5px; height:5px; right:-5px; bottom:-4px; border:1px solid #fff; border-radius:50%; background:inherit; box-shadow:5px 0 0 -1px currentColor; }.dot-tooltip { position:absolute; left:50%; bottom:calc(100% + 10px); display:none; width:max-content; max-width:190px; padding:7px 9px; transform:translateX(-50%); color:#fff; border-radius:7px; background:#26364a; font-size:12px; font-weight:600; white-space:normal; box-shadow:0 6px 18px #20304433; }.dot-tooltip::after { content:''; position:absolute; left:50%; bottom:-4px; width:8px; height:8px; transform:translateX(-50%) rotate(45deg); background:#26364a; }.quad-dot:hover .dot-tooltip,.quad-dot:focus .dot-tooltip { display:block; }.add-in-quad { position:absolute; right:13px; bottom:10px; color:#4784e8; font-size:12px; }
    .calendar-card { border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:#fff; }.calendar-toolbar { display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-bottom:1px solid var(--line); }.calendar-toolbar strong { font-size:16px; }.calendar-toolbar button { padding:5px 8px; color:#647287; }.weekdays,.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); }.weekdays span { padding:10px; color:#8c98a8; text-align:center; font-size:12px; font-weight:700; background:#fbfcfe; }.day { min-height:110px; padding:8px; border-right:1px solid #eef1f5; border-top:1px solid #eef1f5; color:#556276; font-size:12px; }.day:nth-child(7n){border-right:0}.day.muted { color:#c6ced8; background:#fcfdff; }.day.today { background:#f4f8ff; }.day-num { display:inline-grid; place-items:center; width:23px; height:23px; border-radius:50%; }.today .day-num { color:#fff; background:var(--blue); }.calendar-task { display:block; width:100%; margin-top:4px; padding:3px 5px; overflow:hidden; color:#3d587a; text-align:left; text-overflow:ellipsis; white-space:nowrap; border-radius:4px; background:#eaf2ff; font-size:11px; }.calendar-task.critical { color:#a94540; background:#ffebe9; }.calendar-task.neutral { color:#77643d; background:#fff5da; }
    dialog { width:440px; padding:0; border:0; border-radius:16px; box-shadow:0 20px 55px #1c2b4145; }dialog::backdrop { background:#1c2b4130; }.modal { padding:24px; }.modal h2 { margin:0 0 19px; font-size:19px; }.modal input { width:100%; padding:12px; border:1px solid #dbe3ee; border-radius:8px; outline:0; }.modal input:focus { border-color:var(--blue); }.modal-actions { display:flex; justify-content:flex-end; gap:9px; margin-top:19px; }.primary { padding:9px 15px; border-radius:8px; color:#fff; background:var(--blue); }.secondary { padding:9px 12px; color:#647287; }
    @media(max-width:1150px) { .app { grid-template-columns:215px minmax(450px,1fr) 300px; }.main { padding:26px 23px; } }
    .mobile-nav { display:none; }
    @media(max-width:700px) { body { min-width:0; } .app { display:block; height:auto; min-height:100vh; padding-bottom:70px; } .sidebar,.detail { display:none; }.main { padding:22px 16px; overflow:visible; }.top { margin-bottom:18px; }.top h1 { font-size:23px; }.actions .pill:first-child { display:none; }.quick-add { margin-bottom:20px; }.today-board { grid-template-columns:repeat(4,82vw); }.section { min-height:400px; }.section.overdue { grid-column:auto; }.task { grid-template-columns:24px minmax(0,1fr) auto; padding:13px 12px; gap:9px; }.task .meta { display:none; }.quadrant { min-height:175px; padding:13px; }.matrix-wrap { padding:19px 0 0 19px; }.matrix-axis-y,.matrix-axis-x { font-size:10px; }.quad-dot { width:11px; height:11px; }.quad-dot.parent { width:16px; height:16px; }.day { min-height:82px; padding:5px; }.calendar-task { font-size:10px; padding:2px 3px; }.weekdays span { padding:8px 2px; }.mobile-nav { position:fixed; z-index:4; bottom:0; left:0; right:0; height:62px; display:flex; justify-content:space-around; align-items:center; border-top:1px solid var(--line); background:#fff; box-shadow:0 -4px 14px #2135550a; }.mobile-nav button { font-size:11px; color:#7c899a; }.mobile-nav .mobile-active { color:#2871df; font-weight:700; }.mobile-nav span { display:block; font-size:17px; line-height:19px; } dialog { width:calc(100% - 32px); } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">✓</span>清单</div>
      <button class="new-task" id="newTask">＋ 新建任务</button>
      <nav>
        <button class="nav-item" data-view="inbox"><span class="icon">⌑</span>收件箱 <span class="count">12</span></button>
        <button class="nav-item active" data-view="today"><span class="icon">◷</span>今日 <span class="count">8</span></button>
        <button class="nav-item" data-view="quadrant"><span class="icon">⊞</span>四象限</button>
        <button class="nav-item" data-view="calendar"><span class="icon">□</span>日历</button>
        <button class="nav-item" data-view="archive"><span class="icon">▱</span>归档</button>
      </nav>
      <div class="nav-label">项目</div>
      <button class="nav-item project"><span class="icon">›</span>工作 <span class="count">7</span></button><div class="tree"><button>开发</button><button>沟通</button><button>行政</button></div>
      <button class="nav-item project"><span class="icon">›</span>生活 <span class="count">5</span></button><div class="tree"><button>家庭</button><button>个人</button></div>
      <button class="nav-item"><span class="icon">＋</span>新建项目</button>
    </aside>
    <main class="main">
      <div class="top"><div><h1 id="pageTitle">今日</h1><p class="sub" id="pageSub">聚焦现在最值得推进的事项</p></div><div class="actions"><button class="pill">筛选</button><button class="pill">按紧急度 ▾</button></div></div>
      <div id="todayView">
        <div class="quick-add"><b>＋</b><input id="quickInput" placeholder="记录一件要做的事，按 Enter 保存到收件箱" /></div>
        <div class="today-board">
          <section class="section overdue"><div class="section-head">已逾期 / 今天截止 <span class="section-count">2 项</span></div><div class="task-list" id="urgent-list"></div></section>
          <section class="section"><div class="section-head">进行中 <span class="section-count">1 项</span></div><div class="task-list" id="progress-list"></div></section>
          <section class="section"><div class="section-head">计划今天 <span class="section-count">2 项</span></div><div class="task-list" id="today-list"></div></section>
          <section class="section overdue"><div class="section-head">未来有截止时间 <span class="section-count">全部显示</span></div><div class="task-list" id="future-list"></div></section>
        </div>
      </div>
      <div id="quadrantView" hidden><div class="matrix-wrap"><span class="matrix-axis-y">重要性 ↑</span><span class="matrix-axis-x">紧急程度 ←</span><div class="quadrants" id="quadrants"></div></div></div>
      <div id="calendarView" hidden><div class="calendar-card"><div class="calendar-toolbar"><button>‹</button><strong>2026 年 7 月</strong><div><button>今天</button><button>›</button></div></div><div class="weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div><div class="calendar-grid" id="calendarGrid"></div></div></div>
      <div id="simpleView" hidden><div class="task-list" id="simple-list"></div></div>
    </main>
    <aside class="detail" id="detail"><div class="detail-empty">从任务列表中选择一项<br />查看和编辑详细信息</div></aside>
  </div>
  <nav class="mobile-nav"><button data-view="inbox"><span>⌑</span>收件箱</button><button data-view="today" class="mobile-active"><span>◷</span>今日</button><button data-view="quadrant"><span>⊞</span>四象限</button><button data-view="calendar"><span>□</span>日历</button><button data-view="archive"><span>▱</span>归档</button></nav>
  <dialog id="taskModal"><form method="dialog" class="modal" id="taskForm"><h2>新建任务</h2><input id="modalTitle" required autofocus placeholder="记录一件要做的事…" /><div class="modal-actions"><button class="secondary" value="cancel">取消</button><button class="primary" value="default">保存到收件箱</button></div></form></dialog>
  <script>
    const tasks = [
      {id:1,title:'完成预算方案',project:'工作 / 开发',due:'今天 18:00',bucket:'urgent',status:'待进行',important:true,urgent:true,description:'整理预算数据并完成给管理层的方案。',subs:['确认各部门预算','完成方案文档']},
      {id:2,title:'回复客户报价',project:'工作 / 沟通',due:'已逾期 1 天',bucket:'urgent',status:'待进行',important:false,urgent:true,description:'确认报价版本并邮件回复客户。',subs:[]},
      {id:3,title:'设计任务产品',project:'生活 / 个人',due:'7月18日',bucket:'progress',status:'进行中',important:true,urgent:false,description:'梳理 Web 与 App 端的任务管理体验。',subs:['画 Web 原型','整理交互规则']},
      {id:4,title:'联系供应商',project:'工作 / 沟通',due:'今天',bucket:'today',status:'待进行',important:false,urgent:false,description:'确认下周的交付安排。',subs:[]},
      {id:5,title:'整理本周会议纪要',project:'工作 / 行政',due:'今天',bucket:'today',status:'待进行',important:true,urgent:false,description:'归纳待办并同步给参会人。',subs:[]},
      {id:6,title:'制作产品原型',project:'生活 / 个人',due:'7月22日',bucket:'future',status:'待进行',important:true,urgent:false,description:'完成第一版可交互界面。',subs:[]},
      {id:7,title:'续费域名',project:'生活',due:'7月30日',bucket:'future',status:'待进行',important:false,urgent:true,description:'在到期前完成续费。',subs:[]},
      {id:8,title:'整理旧文件',project:'工作 / 行政',due:'8月05日',bucket:'future',status:'收件箱',important:false,urgent:false,description:'清理下载文件夹。',subs:[]}
    ];
    let selected = 1, currentView = 'today';
    const byId = id => tasks.find(t=>t.id===+id);
    function card(t){return `<div class="task ${t.done?'done':''} ${selected===t.id?'selected':''}" data-id="${t.id}"><button class="check" title="完成">${t.done?'✓':''}</button><span class="task-title">${t.title}</span><span class="meta">${t.project}</span><span class="due ${t.bucket==='urgent'?'urgent':''}">${t.due}</span></div>`}
    function renderLists(){ ['urgent','progress','today','future'].forEach(b=>document.getElementById(b+'-list').innerHTML=tasks.filter(t=>t.bucket===b).map(card).join('')); }
    function renderDetail(){const t=byId(selected); if(!t)return; document.getElementById('detail').innerHTML=`<div class="detail-head"><span>任务详情</span><button class="close" id="closeDetail">×</button></div><input id="detail-title" value="${t.title}"><div class="detail-row"><label>状态</label><button class="select">${t.status} ▾</button></div><div class="detail-row"><label>重要度</label><button class="select" id="importance">${t.important?'重要':'不重要'} ▾</button></div><div class="detail-row"><label>紧急度</label><button class="select" id="urgency">${t.urgent?'紧急':'不紧急'} ▾</button></div><div class="detail-row"><label>计划日期</label><button class="select">今天 ▾</button></div><div class="detail-row"><label>截止时间</label><button class="select">${t.due} ▾</button></div><div class="detail-row"><label>项目 / 分类</label><button class="select">${t.project} ▾</button></div><div class="detail-section"><h3>描述</h3><textarea class="desc">${t.description}</textarea></div><div class="detail-section"><h3>子任务 ${t.subs.length?`· 0/${t.subs.length}`:''}</h3>${t.subs.map(s=>`<div class="subtask"><span class="tiny-check"></span>${s}</div>`).join('')}<button class="add-sub">＋ 添加子任务</button></div><button class="danger">归档任务</button>`;
      document.getElementById('importance').onclick=()=>{t.important=!t.important;renderAll()};document.getElementById('urgency').onclick=()=>{t.urgent=!t.urgent;renderAll()};document.getElementById('closeDetail').onclick=()=>{selected=null;renderAll()}; document.getElementById('detail-title').onchange=e=>{t.title=e.target.value;renderAll()}; }
    function renderQuadrants(){const qs=[['重要且紧急',true,true,'q1'],['重要但不紧急',true,false,'q2'],['不重要但紧急',false,true,'q3'],['不重要且不紧急',false,false,'q4']], spots=[[18,23],[45,38],[69,18],[31,66],[76,71],[56,83],[12,79],[85,51]];document.getElementById('quadrants').innerHTML=qs.map(([name,i,u,cls])=>{const dots=tasks.filter(t=>t.important===i&&t.urgent===u&&!t.done).map((t,n)=>{const [x,y]=spots[n%spots.length],parent=t.subs.length>0?'parent':'';return `<button class="quad-dot ${parent}" data-id="${t.id}" style="left:${x}%;top:${y}%" title="${t.title}"><span class="dot-tooltip">${t.subs.length?'◌ ':''}${t.title}</span></button>`}).join('');return `<section class="quadrant ${cls}"><h2>${name}</h2><div class="dot-field">${dots||'<p class="sub">暂无任务</p>'}</div><button class="add-in-quad">＋ 新建任务</button></section>`}).join('');}
    function renderCalendar(){const dates={13:[2],14:[1,4,5],18:[3],22:[6],30:[7]};let html='';for(let i=0;i<35;i++){const day=i-1, inMonth=day>0&&day<=31, today=day===14;const items=(dates[day]||[]).map(id=>{const t=byId(id),type=t.bucket==='urgent'?'critical':t.important?'neutral':'';return `<button class="calendar-task ${type}" data-id="${id}">${t.title}</button>`}).join('');html+=`<div class="day ${!inMonth?'muted':''} ${today?'today':''}">${inMonth?`<span class="day-num">${day}</span>${items}`:''}</div>`}document.getElementById('calendarGrid').innerHTML=html;}
    function renderSimple(){const list= currentView==='inbox'?tasks.filter(t=>t.status==='收件箱'):currentView==='archive'?tasks.filter(t=>t.done):tasks;document.getElementById('simple-list').innerHTML=list.map(card).join('') || '<p class="sub" style="padding:22px">这里还没有任务</p>';}
    function renderAll(){renderLists();renderQuadrants();renderCalendar();renderSimple(); if(selected)renderDetail();else document.getElementById('detail').innerHTML='<div class="detail-empty">从任务列表中选择一项<br />查看和编辑详细信息</div>';}
    document.addEventListener('click',e=>{const task=e.target.closest('[data-id]');if(task){const t=byId(task.dataset.id);if(e.target.classList.contains('check'))t.done=!t.done;selected=t.id;renderAll()} if(e.target.classList.contains('add-in-quad'))document.getElementById('taskModal').showModal();});
    document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{currentView=b.dataset.view;document.querySelectorAll('[data-view]').forEach(n=>{n.classList.toggle('active',n.dataset.view===currentView);n.classList.toggle('mobile-active',n.dataset.view===currentView)});const quad=currentView==='quadrant',calendar=currentView==='calendar',simple=!quad&&!calendar&&currentView!=='today';document.getElementById('todayView').hidden=currentView!=='today';document.getElementById('quadrantView').hidden=!quad;document.getElementById('calendarView').hidden=!calendar;document.getElementById('simpleView').hidden=!simple;const labels={today:['今日','聚焦现在最值得推进的事项'],quadrant:['四象限','根据重要度与紧急度安排下一步'],inbox:['收件箱','先记下，再抽空整理'],calendar:['日历','按计划日期与截止时间查看任务'],archive:['归档','已完成或不再推进的任务']};pageTitle.textContent=labels[currentView][0];pageSub.textContent=labels[currentView][1];renderAll();});
    document.querySelectorAll('.project').forEach(p=>p.onclick=()=>{p.classList.toggle('open');p.querySelector('.icon').textContent=p.classList.contains('open')?'⌄':'›'});document.getElementById('newTask').onclick=()=>taskModal.showModal();
    function addTask(title){const task={id:Date.now(),title,project:'未分类',due:'未设置',bucket:'future',status:'收件箱',important:false,urgent:false,description:'',subs:[]};tasks.unshift(task);selected=task.id;currentView='inbox';document.querySelector('[data-view="inbox"]').click();}
    document.getElementById('quickInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.value.trim()){addTask(e.target.value.trim());e.target.value=''}});document.getElementById('taskForm').addEventListener('submit',e=>{if(e.submitter.value!=='cancel'){e.preventDefault();addTask(modalTitle.value.trim());modalTitle.value='';taskModal.close();}});renderAll();
  </script>
</body>
</html>
